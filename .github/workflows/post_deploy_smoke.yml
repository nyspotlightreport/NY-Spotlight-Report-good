name: Post-Deploy Smoke Tests
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  smoke:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Wait for Netlify deploy
        run: sleep 60

      - name: Run smoke tests
        id: checks
        run: |
          SITE="https://nyspotlightreport.com"
          FAILURES=""
          ALL_PASSED=true
          CRITICAL_FAIL=false
          PASS_COUNT=0
          FAIL_COUNT=0

          check_url() {
            local name="$1" url="$2" expected_status="$3" critical="$4"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url")

            if [ "$status" = "$expected_status" ]; then
              echo "✅ $name — $status"
              PASS_COUNT=$((PASS_COUNT + 1))
              return 0
            else
              echo "❌ $name — expected $expected_status, got $status"
              FAILURES="${FAILURES}${name} (expected ${expected_status}, got ${status})\n"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              ALL_PASSED=false
              [ "$critical" = "true" ] && CRITICAL_FAIL=true
              return 1
            fi
          }

          echo "=== Core Pages ==="
          check_url "Homepage" "$SITE/" "200" "true"
          check_url "Blog Index" "$SITE/blog/" "200" "true"
          check_url "About SC Thomas" "$SITE/about/sc-thomas/" "200" "false"
          check_url "Privacy Policy" "$SITE/privacy/" "200" "false"
          check_url "Editorial Standards" "$SITE/editorial-standards/" "200" "false"
          check_url "Contact" "$SITE/contact/" "200" "false"

          echo "=== Editorial Sections ==="
          check_url "Entertainment" "$SITE/entertainment/" "200" "false"
          check_url "Fashion" "$SITE/fashion/" "200" "false"
          check_url "Nightlife" "$SITE/nightlife/" "200" "false"
          check_url "LGBTQ" "$SITE/lgbtq/" "200" "false"
          check_url "Culture" "$SITE/culture/" "200" "false"

          echo "=== Netlify Functions ==="
          check_url "Subscribe API" "$SITE/.netlify/functions/subscribe" "200" "false"
          check_url "News API" "$SITE/.netlify/functions/api-news" "200" "false"

          echo ""
          echo "=== Results: $PASS_COUNT passed, $FAIL_COUNT failed ==="

          echo "all_passed=$ALL_PASSED" >> $GITHUB_OUTPUT
          echo "critical_fail=$CRITICAL_FAIL" >> $GITHUB_OUTPUT
          echo "pass_count=$PASS_COUNT" >> $GITHUB_OUTPUT
          echo "fail_count=$FAIL_COUNT" >> $GITHUB_OUTPUT
          echo "failures<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FAILURES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Alert on failure
        if: steps.checks.outputs.all_passed == 'false'
        run: |
          curl -s -F "token=${{ secrets.PUSHOVER_API_KEY }}" \
               -F "user=${{ secrets.PUSHOVER_USER_KEY }}" \
               -F "title=⚠️ Smoke Test Failures" \
               -F "message=Post-deploy: ${{ steps.checks.outputs.pass_count }} passed, ${{ steps.checks.outputs.fail_count }} failed after $(echo $GITHUB_SHA | cut -c1-7):
          ${{ steps.checks.outputs.failures }}" \
               -F "priority=0" \
               -F "sound=pushover" \
               https://api.pushover.net/1/messages.json

      - name: Auto-revert on critical failure
        if: steps.checks.outputs.critical_fail == 'true'
        run: |
          git config user.name "Smoke Test Bot"
          git config user.email "smoke@nyspotlightreport.com"
          git revert HEAD --no-edit
          git push origin main

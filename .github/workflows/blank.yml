name: name: NY Spotlight Report — Auto-Publisher

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests feedparser anthropic python-dotenv
      
      - name: Run auto-publisher
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          NETLIFY_SITE_ID:      ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}
        run: python autopublisher.py
      
      - name: Commit updated cache
        run: |
          git config --local user.email "autopublisher@nyspotlightreport.com"
          git config --local user.name "NY Spotlight Auto-Publisher"
          git add published_articles.json index.html || true
          git diff --staged --quiet || git commit -m "Auto-publish: $(date '+%Y-%m-%d %H:%M') ET"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

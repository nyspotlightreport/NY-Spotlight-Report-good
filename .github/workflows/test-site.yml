name: Test Site Functions

on:
  push:
    paths: ['netlify/**', 'package.json']
  pull_request:
    paths: ['netlify/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd netlify/functions && npm ci
      - run: npm test

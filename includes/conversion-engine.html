<!-- CONVERSION ENGINE — Newsletter & Engagement for NY Spotlight Report -->

<!-- STICKY BOTTOM NEWSLETTER BAR -->
<div id="sticky-cta" style="position:fixed;bottom:0;left:0;right:0;background:#0f0f0f;padding:10px 24px;display:flex;justify-content:center;align-items:center;gap:16px;z-index:9999;transform:translateY(100%);transition:transform .3s ease;box-shadow:0 -2px 20px rgba(0,0,0,.15)">
<span style="font-family:'DM Sans',sans-serif;font-size:14px;color:rgba(255,255,255,.7)">Get NYC's best stories delivered <strong style="color:#fff">every week</strong></span>
<a href="/newsletter/" style="background:#9e7c0c;color:#fff;padding:8px 20px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap">Subscribe Free →</a>
<span style="font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,.3);cursor:pointer" onclick="this.parentElement.style.display='none';sessionStorage.setItem('cta_closed','1')">✕</span>
</div>

<!-- EXIT INTENT POPUP — Newsletter Signup -->
<div id="exit-popup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;justify-content:center;align-items:center;backdrop-filter:blur(4px)">
<div style="background:#fff;border-radius:8px;padding:40px;max-width:480px;width:90%;text-align:center;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)">
<span onclick="document.getElementById('exit-popup').style.display='none';sessionStorage.setItem('exit_shown','1')" style="position:absolute;top:12px;right:16px;font-size:20px;color:#a3a3a3;cursor:pointer">✕</span>
<h3 style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:8px;color:#0f0f0f">Before you go...</h3>
<p style="font-family:'DM Sans',sans-serif;font-size:15px;color:#6b6b6b;margin-bottom:20px;line-height:1.55">Join <strong style="color:#0f0f0f">NY Spotlight Report</strong> — the insider newsletter covering NYC entertainment, fashion, nightlife &amp; culture.</p>
<input type="email" id="exit-email" placeholder="your@email.com" style="width:100%;padding:12px;border:1px solid #e5e5e5;border-radius:5px;font-size:15px;font-family:'DM Sans',sans-serif;margin-bottom:10px;outline:none">
<button onclick="captureExitLead()" style="width:100%;padding:12px;background:#0f0f0f;color:#fff;border:none;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer">Subscribe Free →</button>
<p style="font-family:'DM Sans',sans-serif;font-size:11px;color:#a3a3a3;margin-top:8px">No spam. Unsubscribe anytime.</p>
</div>
</div>

<script>
// Sticky CTA — show after 30% scroll
(function(){
  if(sessionStorage.getItem('cta_closed'))return;
  var shown=false;
  window.addEventListener('scroll',function(){
    if(shown)return;
    var pct=window.scrollY/(document.body.scrollHeight-window.innerHeight);
    if(pct>0.3){
      document.getElementById('sticky-cta').style.transform='translateY(0)';
      shown=true;
    }
  });
})();

// Exit intent — show when mouse leaves viewport (desktop only)
(function(){
  if(sessionStorage.getItem('exit_shown'))return;
  if('ontouchstart' in window)return;
  document.addEventListener('mouseout',function(e){
    if(!e.relatedTarget && !e.toElement && e.clientY<10){
      document.getElementById('exit-popup').style.display='flex';
      sessionStorage.setItem('exit_shown','1');
    }
  });
})();

// Lead capture
function captureExitLead(){
  var email=document.getElementById('exit-email').value;
  if(!email||!email.includes('@'))return;
  fetch('/.netlify/functions/lead-capture',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,source:'exit_intent',page:location.pathname})}).catch(function(){});
  fetch('/.netlify/functions/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,source:'exit_popup'})}).catch(function(){});
  localStorage.setItem('nysr_lead',email);
  document.getElementById('exit-popup').innerHTML='<div style="background:#fff;border-radius:8px;padding:48px;text-align:center"><h3 style="font-family:Playfair Display,serif;font-size:24px;color:#16793a">You\'re in!</h3><p style="font-family:DM Sans,sans-serif;font-size:15px;color:#6b6b6b;margin-top:8px">Check your inbox for your first edition.</p></div>';
  setTimeout(function(){document.getElementById('exit-popup').style.display='none'},3000);
}

// Track page views for analytics
(function(){
  fetch('/.netlify/functions/track',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({event:'pageview',page:location.pathname,ref:document.referrer,ts:Date.now()})}).catch(function(){});
})();
</script>
